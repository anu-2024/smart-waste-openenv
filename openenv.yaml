name: smart-waste-management-openenv
version: 0.2
description: AI environment for municipal waste complaint routing

observation_space:
  complaint: string
  location: string
  step: string

action_space:
  category: string
  department: string
  inspect: boolean
  assign_truck: boolean
  cleanup_complete: boolean

tasks:

  - name: easy
    type: grading
    difficulty: easy
    grader: tasks.easy_task

  - name: medium
    type: grading
    difficulty: medium
    grader: tasks.medium_task

  - name: hard
    type: grading
    difficulty: hard
    grader: tasks.hard_task

tags:
  - openenv

entrypoint: inference.py
